name: Build & Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Scrape"]
    types: [completed]

concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Lancement manuel, ou automatique uniquement si le scrape a réussi
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: build/requirements.txt

      - name: Générer les JSON statiques depuis Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pip install -r build/requirements.txt
          python build/generate.py

      - name: Valider l'intégrité de dist/
        run: python build/validate.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Deploy Cloudflare Pages (JSON statiques + images)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name=tanuki-poneglyph

      - name: Deploy Cloudflare Worker (API REST)
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          npx wrangler deploy
