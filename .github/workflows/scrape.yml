name: Scrape

on:
  workflow_dispatch:
    inputs:
      series:
        description: "Séries à scraper (valeurs ou set_id, séparés par des virgules). Vide = tout."
        required: false
        type: string
  schedule:
    # Cron mensuel : le 1er du mois à 03h00 UTC
    - cron: "0 3 1 * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Installer les dépendances
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Scraper Bandai FR → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.series }}" ]; then ARGS="--series ${{ inputs.series }}"; fi
          python scraper/scrape.py $ARGS

      - name: Commit des images WebP
        if: success()
        run: |
          git config user.name "poneglyph-bot"
          git config user.email "actions@github.com"
          git add images/
          if ! git diff --cached --quiet; then
            git commit -m "chore(scraper): mise à jour des images WebP"
            git push
          else
            echo "Aucune nouvelle image."
          fi

      - name: Rapport de scraping (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-report
          path: scraper/report.json
          if-no-files-found: ignore

      - name: Ouvrir une GitHub Issue en cas d'échec
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let details = "Rapport indisponible (échec avant écriture de report.json).";
            try {
              const report = JSON.parse(fs.readFileSync('scraper/report.json', 'utf-8'));
              details = "```json\n" + JSON.stringify(report, null, 2) + "\n```";
            } catch {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Scraping échoué — run ${context.runId}`,
              labels: ["scraper", "bug"],
              body: [
                `Le scraping du ${new Date().toISOString().slice(0, 10)} a échoué`,
                `(validation card_count ou erreur réseau). Le build n'a PAS été lancé.`,
                ``,
                `Run : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                details,
              ].join("\n"),
            });
